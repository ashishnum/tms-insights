<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMS Insights</title>
  <script>
    (function() {
      const correct = 'Transportation$$1';
      const key = 'tms_hub_auth';
      if (sessionStorage.getItem(key) !== '1') {
        const input = prompt('TMS Insights — Project Hub\n\nEnter password:');
        if (input !== correct) {
          document.documentElement.innerHTML = '<body style="background:#0f1117;color:#7a8099;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-size:14px;">Access denied.</body>';
          throw new Error('Unauthorized');
        }
        sessionStorage.setItem(key, '1');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --border: #252a38;
      --accent: #4f8ef7;
      --text: #e8eaf0;
      --text-muted: #7a8099;
      --green: #3ecf8e;
      --yellow: #f5a623;
      --purple: #a78bfa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ── */
    header {
      padding: 48px 48px 0;
      border-bottom: 1px solid var(--border);
    }

    .header-inner { max-width: 1100px; margin: 0 auto; }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .sunrise-logo { width: 48px; height: 48px; flex-shrink: 0; }

    h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.3px; }

    .subtitle { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      margin-top: 12px;
    }

    /* ── Tab bar ── */
    .tab-bar { display: flex; margin-top: 28px; }

    .tab-btn {
      padding: 10px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 48px 0; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Stats ── */
    .stats {
      display: flex;
      gap: 32px;
      padding: 20px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .stat { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 600; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 56px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .15s, transform .15s, box-shadow .15s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(79, 142, 247, 0.1);
    }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }

    .card-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }

    .tag {
      font-size: 10px; font-weight: 600;
      letter-spacing: .6px; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px;
    }

    .tag-Dashboard  { background: rgba(79,142,247,.15);  color: var(--accent); }
    .tag-Explorer   { background: rgba(79,142,247,.15);  color: var(--accent); }
    .tag-Theme      { background: rgba(79,142,247,.15);  color: var(--accent); }
    .tag-Map        { background: rgba(62,207,142,.12);  color: var(--green); }
    .tag-Grant      { background: rgba(245,166,35,.12);  color: var(--yellow); }
    .tag-Research   { background: rgba(167,139,250,.12); color: var(--purple); }
    .tag-Strategy   { background: rgba(62,207,142,.12);  color: var(--green); }
    .tag-Reference  { background: rgba(245,166,35,.12);  color: var(--yellow); }

    /* ── Links tab ── */
    .links-list { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }

    .link-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 1fr 2fr auto;
      align-items: center;
      gap: 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, transform .15s;
    }

    .link-row:hover {
      border-color: var(--accent);
      transform: translateX(3px);
    }

    .link-name { font-size: 15px; font-weight: 600; }

    .link-notes { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

    .link-url {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .link-url::after { content: '↗'; font-size: 13px; }

    .card-title { font-size: 17px; font-weight: 600; line-height: 1.4; }

    .card-desc { font-size: 13.5px; color: var(--text-muted); line-height: 1.7; }

    .card-highlights { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }

    .highlight-item {
      font-size: 11px;
      background: rgba(79,142,247,0.08);
      color: var(--accent);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 20px;
      padding: 3px 10px;
    }

    .card-footer {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: space-between; gap: 6px;
    }

    .card-footer-file { display: flex; align-items: center; gap: 6px; }

    .card-footer-file::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .card-author { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); }
    .card-author::before { content: '👤'; font-size: 10px; }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="brand-row">
        <svg class="sunrise-logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="4" y1="34" x2="44" y2="34" stroke="#252a38" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M10 34 A14 14 0 0 1 38 34" stroke="url(#sunGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <line x1="24" y1="14" x2="24" y2="10" stroke="#f5a623" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="33.9" y1="17.1" x2="36.7" y2="14.3" stroke="#f5a623" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
          <line x1="14.1" y1="17.1" x2="11.3" y2="14.3" stroke="#f5a623" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
          <line x1="38" y1="27" x2="42" y2="26" stroke="#f5a623" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
          <line x1="10" y1="27" x2="6" y2="26" stroke="#f5a623" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
          <circle cx="24" cy="34" r="3.5" fill="url(#sunGrad)"/>
          <ellipse cx="24" cy="34" rx="16" ry="3" fill="url(#glowGrad)" opacity="0.25"/>
          <defs>
            <linearGradient id="sunGrad" x1="10" y1="34" x2="38" y2="20" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#f5a623"/>
              <stop offset="100%" stop-color="#4f8ef7"/>
            </linearGradient>
            <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#f5a623"/>
              <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
            </radialGradient>
          </defs>
        </svg>
        <h1>TMS Insights</h1>
      </div>
      <p class="subtitle">Traffic Management & Safety Analytics — Project Hub</p>
      <span class="badge">City: Concord &nbsp;|&nbsp; California</span>
      <div class="tab-bar" id="tab-bar"></div>
    </div>
  </header>

  <div class="container" id="main"></div>

  <script>
    const ICON_BG = {
      Dashboard: 'rgba(79,142,247,.12)',
      Explorer:  'rgba(79,142,247,.12)',
      Theme:     'rgba(255,255,255,.1)',
      Map:       'rgba(62,207,142,.12)',
      Grant:     'rgba(245,166,35,.12)',
      Research:  'rgba(167,139,250,.12)',
      Strategy:  'rgba(62,207,142,.12)',
      Reference: 'rgba(245,166,35,.12)',
    };

    function renderCard(card) {
      const highlights = card.highlights.length
        ? `<div class="card-highlights">${card.highlights.map(h =>
            `<span class="highlight-item">${h}</span>`).join('')}</div>`
        : '';

      return `
        <a class="card" href="${card.file}">
          <div class="card-top">
            <div class="card-icon" style="background:${ICON_BG[card.tag] || 'rgba(79,142,247,.12)'}">
              ${card.icon}
            </div>
            <span class="tag tag-${card.tag}">${card.tag}</span>
          </div>
          <div class="card-title">${card.title}</div>
          <div class="card-desc">${card.desc}</div>
          ${highlights}
          <div class="card-footer">
            <span class="card-footer-file">${card.file}</span>
            <span class="card-author">${card.author}</span>
          </div>
        </a>`;
    }

    function renderStats(tab) {
      const sections = tab.sections;
      const total = sections.reduce((n, s) => n + s.cards.length, 0);
      const statItems = [
        { value: total, label: tab.id === 'prototypes' ? 'Prototypes' : 'Documents' },
        ...sections.map(s => ({ value: s.cards.length, label: s.label }))
      ];
      return `<div class="stats">${statItems.map(s =>
        `<div class="stat">
          <div class="stat-value">${s.value}</div>
          <div class="stat-label">${s.label}</div>
        </div>`).join('')}</div>`;
    }

    function renderLinksTab(tab) {
      const rows = tab.links.map(l => `
        <a class="link-row" href="${l.url}" target="_blank" rel="noopener">
          <div class="link-name">${l.name}</div>
          <div class="link-notes">${l.notes}</div>
          <div class="link-url">${l.url}</div>
        </a>`).join('');
      return `<div class="tab-panel" id="tab-${tab.id}">
        <div class="stats">
          <div class="stat"><div class="stat-value">${tab.links.length}</div><div class="stat-label">Links</div></div>
        </div>
        <div class="section-label">All Links</div>
        <div class="links-list">${rows}</div>
      </div>`;
    }

    function renderTab(tab) {
      if (tab.links) return renderLinksTab(tab);
      const sections = tab.sections.map(s => `
        <div class="section-label">${s.label}</div>
        <div class="grid">${s.cards.map(renderCard).join('')}</div>
      `).join('');
      return `<div class="tab-panel" id="tab-${tab.id}">${renderStats(tab)}${sections}</div>`;
    }

    function switchTab(id) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${id}`));
    }

    fetch('cards.json')
      .then(r => r.json())
      .then(data => {
        // Render tab buttons
        document.getElementById('tab-bar').innerHTML = data.tabs.map(tab =>
          `<button class="tab-btn" data-tab="${tab.id}" onclick="switchTab('${tab.id}')">${tab.label}</button>`
        ).join('');

        // Render tab panels
        document.getElementById('main').innerHTML = data.tabs.map(renderTab).join('');

        // Activate first tab
        switchTab(data.tabs[0].id);
      });
  </script>

</body>
</html>
