<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concord TMS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#f7f7f5}

#map{position:absolute;inset:0;z-index:0}

/* full monochrome — strip all colour from tiles */
.leaflet-tile-pane{filter:grayscale(1) brightness(1.06) contrast(0.88)}

.leaflet-control-zoom{
  border:none!important;border-radius:10px!important;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.1)!important;
}
.leaflet-control-zoom a{
  width:36px!important;height:36px!important;line-height:36px!important;
  font-size:16px!important;color:#555!important;background:#fff!important;
  border-bottom:1px solid #eee!important;border-radius:0!important;
  font-weight:300!important;
}
.leaflet-control-zoom a:hover{background:#fafafa!important;color:#111!important}
.leaflet-control-attribution{font-size:9px!important;color:#aaa!important;background:rgba(255,255,255,.75)!important}

/* ══ TOPBAR ══ */
.topbar{
  position:absolute;top:0;left:0;right:0;height:54px;z-index:1000;
  background:#fff;border-bottom:1px solid #ebebeb;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  display:flex;align-items:center;padding:0 18px;gap:14px;
}
.tb-brand{display:flex;align-items:center;gap:9px;flex-shrink:0}
.tb-mark{
  width:32px;height:32px;border-radius:8px;background:#1c1c1e;
  display:flex;align-items:center;justify-content:center;
}
.tb-mark svg{width:18px;height:18px}
.tb-name{font-size:12px;font-weight:500;color:#3c3c3e;letter-spacing:-.01em}
.tb-city{font-size:10px;color:#c4c8d0;font-weight:400;margin-top:1px}

.tb-div{width:1px;height:22px;background:#ebebeb;flex-shrink:0}

/* mode toggle group */
.tb-modes{display:flex;gap:2px;background:#f2f2f2;border-radius:20px;padding:3px}
.mmode{
  display:flex;align-items:center;gap:6px;padding:5px 14px;
  border-radius:16px;border:none;cursor:pointer;
  font-size:11px;font-weight:400;font-family:'Inter',sans-serif;
  color:#a0a4ac;background:transparent;transition:all .16s;
}
.mmode svg{width:13px;height:13px;flex-shrink:0}
.mmode:hover{color:#555}
.mmode.active{background:#fff;color:#444;box-shadow:0 1px 4px rgba(0,0,0,.09);font-weight:500}
/* accent dot on active */
.mmode.active .mmode-dot{opacity:1}
.mmode-dot{width:6px;height:6px;border-radius:50%;opacity:0;transition:opacity .16s;flex-shrink:0}

/* global show/hide chips */
.tb-chips{display:flex;gap:6px}
.chip{
  display:flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:14px;
  border:1.5px solid #ededee;background:#fff;
  cursor:pointer;font-size:11px;font-weight:400;
  font-family:'Inter',sans-serif;color:#b0b4bc;
  transition:all .16s;
}
.chip:hover{border-color:#ccc;color:#444}
.chip.on.int{border-color:#3b82f6;color:#3b82f6;background:#eff6ff}
.chip.on.cor{border-color:#ec4899;color:#ec4899;background:#fdf2f8}
.chip.on.dis{border-color:#10b981;color:#10b981;background:#ecfdf5}
.chip-pip{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

.tb-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.kpi{text-align:right}
.kpi-n{font-size:13px;font-weight:500;color:#4a4a4e;font-family:'JetBrains Mono',monospace;line-height:1}
.kpi-l{font-size:9px;color:#c4c8d0;text-transform:uppercase;letter-spacing:.08em;margin-top:1px}

/* ══ SIDEBAR ══ */
.sidebar{
  position:absolute;top:54px;right:0;bottom:0;width:340px;
  z-index:900;background:#fff;border-left:1px solid #ebebeb;
  box-shadow:-3px 0 20px rgba(0,0,0,.07);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.sidebar.open{transform:translateX(0)}

/* sidebar header */
.sb-head{padding:14px 16px 12px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.sb-top-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-feat-icon{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.sb-feat-title{font-size:12px;font-weight:500;color:#3c3c3e;letter-spacing:-.01em;line-height:1.3}
.sb-feat-sub{font-size:10px;color:#c4c8d0;margin-top:2px;line-height:1.4}
.sb-type-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:8px;
  font-size:9px;font-weight:600;font-family:'JetBrains Mono',monospace;
  letter-spacing:.05em;margin-bottom:8px;
}
.sb-close{
  width:28px;height:28px;border-radius:50%;border:none;
  background:#f5f5f5;cursor:pointer;margin-left:auto;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:background .14s;
}
.sb-close:hover{background:#eee}
.sb-close svg{width:11px;height:11px;color:#888}

/* search */
.sb-search{
  display:flex;align-items:center;gap:7px;
  background:#f7f7f5;border:1.5px solid transparent;
  border-radius:9px;padding:0 11px;height:34px;
  transition:all .18s;
}
.sb-search:focus-within{background:#fff;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.sb-search input{flex:1;border:none;background:transparent;font-size:12px;font-family:'Inter',sans-serif;color:#1c1c1e;outline:none}
.sb-search input::placeholder{color:#c0c4cc}
.sb-search svg{color:#c0c4cc;flex-shrink:0}

/* layer counts bar */
.sb-sumbar{display:flex;gap:0;margin-top:10px;background:#f7f7f5;border-radius:9px;overflow:hidden}
.sbc{flex:1;padding:7px 5px;text-align:center;border-right:1px solid #eee}
.sbc:last-child{border-right:none}
.sbc-n{font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;line-height:1}
.sbc-l{font-size:8px;color:#b0b4bc;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

/* scroll */
.sb-scroll{flex:1;overflow-y:auto;padding:4px 0 20px}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:#e8e8e8;border-radius:2px}

/* group section */
.gsec-hdr{
  display:flex;align-items:center;gap:7px;padding:9px 16px 5px;
  cursor:pointer;user-select:none;
  position:sticky;top:0;background:#fff;z-index:2;
}
.gsec-hdr:hover{background:#fafafa}
.gsec-chev{width:12px;height:12px;color:#ccc;transition:transform .16s;flex-shrink:0}
.gsec-chev.open{transform:rotate(90deg)}
.gsec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gsec-name{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;flex:1}
.gsec-ct{font-size:9px;font-family:'JetBrains Mono',monospace;color:#d0d4dc;background:#f7f7f9;padding:1px 6px;border-radius:7px}
.gsec-body{overflow:hidden;transition:max-height .2s ease}

/* layer row */
.lr{
  display:flex;align-items:center;gap:10px;
  padding:7px 16px;cursor:pointer;transition:background .1s;
}
.lr:hover{background:#fafafa}

/* Google Maps style pin: colored body, white icon */
.gpin{
  width:30px;height:36px;flex-shrink:0;
  position:relative;display:flex;justify-content:center;
}
.gpin-shape{position:absolute;top:0;left:0;width:30px;height:36px}
.gpin-ic{
  position:absolute;top:5px;left:50%;
  transform:translateX(-50%);
  width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
}
.gpin-ic svg{width:12px;height:12px}
.lr.off .gpin{opacity:.32}
.lr.off .lr-name{color:#b0b4bc;font-weight:400}

.lr-info{flex:1;min-width:0}
.lr-name{font-size:11px;font-weight:400;color:#3c3c3e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lr-desc{font-size:10px;color:#c4c8d0;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* tags */
.ptag{font-size:8px;padding:2px 5px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-weight:400;flex-shrink:0;letter-spacing:.02em;opacity:.75}
.ptag.eng{background:#eff6ff;color:#3b82f6}
.ptag.pub{background:#f0fdf4;color:#22c55e}
.ptag.off{background:#fffbeb;color:#f59e0b}
.ptag.dir{background:#faf5ff;color:#a855f7}
.ptag.sa{background:#fff1f2;color:#f43f5e}

/* toggle */
.tog{
  width:38px;height:20px;border-radius:10px;
  background:#e2e4ea;position:relative;cursor:pointer;
  transition:background .18s;border:none;flex-shrink:0;
}
.tog.on{background:#3b82f6}
.tog-k{
  width:15px;height:15px;border-radius:50%;background:#fff;
  position:absolute;top:2.5px;left:2.5px;transition:left .16s;
  box-shadow:0 1px 3px rgba(0,0,0,.18);
}
.tog.on .tog-k{left:20.5px}

/* ══ MAP OVERLAYS ══ */
.hint{
  position:absolute;bottom:18px;left:50%;
  transform:translateX(-50%) translateX(-170px);
  background:rgba(28,28,30,.82);backdrop-filter:blur(10px);
  color:#fff;font-size:11px;font-family:'Inter',sans-serif;
  padding:8px 16px;border-radius:20px;z-index:800;
  pointer-events:none;transition:opacity .4s;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.hint.gone{opacity:0}

/* legend */
.legend{
  position:absolute;top:66px;left:14px;
  background:#fff;border-radius:12px;border:1px solid #ebebeb;
  padding:11px 13px;box-shadow:0 2px 12px rgba(0,0,0,.07);
  z-index:700;min-width:140px;
}
.leg-hd{font-size:8px;font-weight:400;color:#c8ccd4;text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:10px;color:#9a9ea8;font-weight:400}
.leg-row:last-child{margin-bottom:0}
.leg-int{width:10px;height:10px;border-radius:50%;background:#3b82f6;border:2px solid white;box-shadow:0 0 0 1.5px #3b82f6;flex-shrink:0}
.leg-cor{width:18px;height:3.5px;border-radius:2px;background:#ec4899;flex-shrink:0}
.leg-dis{width:12px;height:9px;border:2px dashed #10b981;border-radius:2px;flex-shrink:0}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* sev bar */
.sevbar{
  position:absolute;bottom:14px;left:14px;
  background:#fff;border:1px solid #ebebeb;border-radius:16px;
  padding:6px 12px;box-shadow:0 1px 8px rgba(0,0,0,.07);
  z-index:700;display:flex;gap:12px;
}
.sev-i{display:flex;align-items:center;gap:4px;font-size:9px;color:#aeb2bc;font-weight:400}
.sev-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* no results */
.nores{padding:28px 16px;text-align:center;color:#c0c4cc;font-size:12px}
</style>
</head>
<body>
<div id="map"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-brand">
    <div class="tb-mark">
      <svg viewBox="0 0 18 18" fill="none">
        <path d="M9 1.5L16.5 5.5V12.5L9 16.5L1.5 12.5V5.5L9 1.5Z" stroke="white" stroke-width="1.4" fill="none"/>
        <circle cx="9" cy="9" r="2.8" fill="white"/>
      </svg>
    </div>
    <div>
      <div class="tb-name">Concord TMS</div>
      <div class="tb-city">City of Concord · CA</div>
    </div>
  </div>

  <div class="tb-div"></div>

  <div class="tb-modes">
    <button class="mmode active" id="mode-intersection" onclick="setMode('intersection')">
      <div class="mmode-dot" style="background:#3b82f6"></div>
      <svg viewBox="0 0 13 13" fill="none">
        <line x1="6.5" y1="1" x2="6.5" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="1" y1="6.5" x2="12" y2="6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="6.5" cy="6.5" r="2.8" fill="currentColor"/>
      </svg>
      Intersections
    </button>
    <button class="mmode" id="mode-corridor" onclick="setMode('corridor')">
      <div class="mmode-dot" style="background:#ec4899"></div>
      <svg viewBox="0 0 13 13" fill="none">
        <path d="M2 11.5 Q4.5 8 6.5 6.5 Q8.5 5 11.5 1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
        <circle cx="2" cy="11.5" r="1.8" fill="currentColor"/>
        <circle cx="11.5" cy="1.5" r="1.8" fill="currentColor"/>
      </svg>
      Corridors
    </button>
    <button class="mmode" id="mode-district" onclick="setMode('district')">
      <div class="mmode-dot" style="background:#10b981"></div>
      <svg viewBox="0 0 13 13" fill="none">
        <rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/>
        <rect x="7" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4" fill="currentColor" opacity=".2"/>
        <rect x="1" y="7" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4" fill="currentColor" opacity=".2"/>
        <rect x="7" y="7" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/>
      </svg>
      Districts
    </button>
  </div>

  <div class="tb-div"></div>

  <!-- Global show/hide -->
  <div class="tb-chips">
    <button class="chip int on" id="chip-int" onclick="globalToggle('int')">
      <span class="chip-pip"></span>Intersections
    </button>
    <button class="chip cor on" id="chip-cor" onclick="globalToggle('cor')">
      <span class="chip-pip"></span>Corridors
    </button>
    <button class="chip dis on" id="chip-dis" onclick="globalToggle('dis')">
      <span class="chip-pip"></span>Districts
    </button>
  </div>

  <div class="tb-right">
    <div class="tb-div"></div>
    <div class="kpi"><div class="kpi-n" id="kpiN">0</div><div class="kpi-l">Active</div></div>
    <div class="kpi"><div class="kpi-n" style="color:#e11d48">847</div><div class="kpi-l">Collisions</div></div>
    <div class="kpi"><div class="kpi-n" style="color:#f59e0b">23</div><div class="kpi-l">KSI</div></div>
  </div>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="leg-hd">Elements</div>
  <div class="leg-row"><div class="leg-int"></div>Intersection</div>
  <div class="leg-row"><div class="leg-cor"></div>Corridor</div>
  <div class="leg-row"><div class="leg-dis"></div>District</div>
  <div style="height:1px;background:#f0f0f0;margin:8px 0"></div>
  <div class="leg-hd">Severity</div>
  <div class="leg-row"><div class="leg-dot" style="background:#dc2626"></div>Fatal</div>
  <div class="leg-row"><div class="leg-dot" style="background:#ea580c"></div>Severe</div>
  <div class="leg-row"><div class="leg-dot" style="background:#d97706"></div>Visible</div>
  <div class="leg-row"><div class="leg-dot" style="background:#3b82f6"></div>Pain</div>
</div>

<!-- SEV BAR -->
<div class="sevbar">
  <div class="sev-i"><div class="sev-d" style="background:#dc2626"></div>Fatal</div>
  <div class="sev-i"><div class="sev-d" style="background:#ea580c"></div>Severe</div>
  <div class="sev-i"><div class="sev-d" style="background:#d97706"></div>Visible</div>
  <div class="sev-i"><div class="sev-d" style="background:#3b82f6"></div>Pain</div>
</div>

<!-- HINT -->
<div class="hint" id="hint">Click an intersection, corridor or district to manage layers</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <div style="display:flex;align-items:flex-start">
      <div style="flex:1">
        <span class="sb-type-tag" id="sbTag"></span>
        <div class="sb-top-row">
          <div class="sb-feat-icon" id="sbIcon"></div>
          <div>
            <div class="sb-feat-title" id="sbTitle">—</div>
            <div class="sb-feat-sub" id="sbSub">—</div>
          </div>
        </div>
      </div>
      <button class="sb-close" onclick="closeSidebar()">
        <svg viewBox="0 0 11 11" fill="none"><path d="M2 2l7 7M9 2l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="sb-search">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.4"/>
        <line x1="7.5" y1="7.5" x2="11" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input id="sbSearch" placeholder="Search layers…" oninput="filterLayers(this.value)">
    </div>

    <div class="sb-sumbar" id="sbSum"></div>
  </div>

  <div class="sb-scroll" id="sbScroll"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ══════════════════════════════════════
// WHITE ICONS (for colored pin markers)
// ══════════════════════════════════════
const WIC={
  collision:`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="white" stroke-width="1.3"/><line x1="6" y1="3" x2="6" y2="6.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/><circle cx="6" cy="8.5" r=".8" fill="white"/></svg>`,
  signal:`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="4" y="1" width="4" height="10" rx="1.4" stroke="white" stroke-width="1.2"/><circle cx="6" cy="3.5" r=".9" fill="white"/><circle cx="6" cy="6" r=".9" fill="white"/><circle cx="6" cy="8.5" r=".9" fill="white"/></svg>`,
  stop:`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polygon points="4.2,1 7.8,1 11,4.2 11,7.8 7.8,11 4.2,11 1,7.8 1,4.2" stroke="white" stroke-width="1.2" fill="none"/><line x1="6" y1="3.8" x2="6" y2="6.8" stroke="white" stroke-width="1.2" stroke-linecap="round"/><circle cx="6" cy="8.5" r=".75" fill="white"/></svg>`,
  rrfb:`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="4" width="10" height="4.5" rx="2.2" stroke="white" stroke-width="1.2"/><circle cx="3.8" cy="6.2" r="1.3" fill="white"/><circle cx="8.2" cy="6.2" r="1.3" fill="white"/></svg>`,
  flasher:`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polygon points="6,1.5 11,10.5 1,10.5" stroke="white" stroke-width="1.2" fill="none"/><line x1="6" y1="4.5" x2="6" y2="7.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/><circle cx="6" cy="9" r=".75" fill="white"/></svg>`,
  detection:`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2.5" y="4.5" width="7" height="4" rx=".7" stroke="white" stroke-width="1.2"/><path d="M1 2.8C2.2 1.4 4 .8 6 .8S9.8 1.4 11 2.8" stroke="white" stroke-width="1.1" fill="none" stroke-linecap="round"/><path d="M3 4.5C3.7 3.2 4.8 2.8 6 2.8S8.3 3.2 9 4.5" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/></svg>`,
  sidewalk:`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="1.5" y1="4.5" x2="10.5" y2="4.5" stroke="white" stroke-width="1.6" stroke-dasharray="2.5 1.5" stroke-linecap="round"/><line x1="1.5" y1="7.5" x2="10.5" y2="7.5" stroke="white" stroke-width="1.6" stroke-dasharray="2.5 1.5" stroke-linecap="round"/></svg>`,

function iDotIcon(sel){
  const s=sel?22:16;
  return L.divIcon({
    html:`<div style="
      width:${s}px;height:${s}px;border-radius:50%;background:#3b82f6;
      border:${sel?4:2.5}px solid white;
      box-shadow:${sel?'0 0 0 3px #3b82f6,0 4px 20px rgba(59,130,246,.55)':'0 0 0 1.5px rgba(59,130,246,.35),0 2px 10px rgba(59,130,246,.3)'};
      cursor:pointer;transition:all .2s;
    "></div>`,
    iconSize:[s,s],iconAnchor:[s/2,s/2],className:''
  });
}

INTERSECTIONS.forEach(ix=>{
  const m=L.marker([ix.lat,ix.lng],{icon:iDotIcon(false),zIndexOffset:200}).addTo(map);
  m.on('click',e=>{L.DomEvent.stop(e);openFeature(ix.id,'intersection');});
  m.on('mouseover',()=>{if(currentFid!==ix.id){const el=m.getElement()?.querySelector('div');if(el){el.style.width='20px';el.style.height='20px';el.style.marginLeft='-2px';el.style.marginTop='-2px';}}});
  m.on('mouseout',()=>{if(currentFid!==ix.id){const el=m.getElement()?.querySelector('div');if(el){el.style.width='16px';el.style.height='16px';el.style.marginLeft='0';el.style.marginTop='0';}}});
  iMkrs.push({id:ix.id,m});
});

  });
  L.marker(ctr,{icon:lbl,interactive:true,zIndexOffset:100}).addTo(map)
    .on('click',e=>{L.DomEvent.stop(e);openFeature(d.id,'district');});
  poly.on('click',e=>{L.DomEvent.stop(e);openFeature(d.id,'district');});
  poly.on('mouseover',()=>{if(currentFid!==d.id)poly.setStyle({fillOpacity:.14,weight:2.5});});
  poly.on('mouseout',()=>{if(currentFid!==d.id)poly.setStyle({fillOpacity:.07,weight:2});});
  dPolys.push({id:d.id,poly});
});

// ══════════════════════════════════════
// MODE SWITCH
// ══════════════════════════════════════
function setMode(m){
  document.querySelectorAll('.mmode').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+m).classList.add('active');
  updateHint(m);
}

// ══════════════════════════════════════
// GLOBAL TOGGLES
// ══════════════════════════════════════
function globalToggle(type){
  globalShow[type]=!globalShow[type];
  const btn=document.getElementById('chip-'+type);
  btn.classList.toggle('on',globalShow[type]);
  if(type==='int') iMkrs.forEach(({m})=>{const el=m.getElement();if(el)el.style.display=globalShow.int?'':'none';});
  if(type==='cor') cLns.forEach(({line,glow,outline,e1,e2})=>{
    const o=globalShow.cor;
    line.setStyle({opacity:o?.85:0});outline.setStyle({opacity:o?.6:0});glow.setStyle({opacity:o?.08:0});
    e1.setStyle({fillOpacity:o?1:0,opacity:o?1:0});e2.setStyle({fillOpacity:o?1:0,opacity:o?1:0});
  });
  if(type==='dis') dPolys.forEach(({poly})=>poly.setStyle({opacity:globalShow.dis?1:0,fillOpacity:globalShow.dis?.07:0}));
}

// ══════════════════════════════════════
// OPEN FEATURE
// ══════════════════════════════════════
function openFeature(fid,ftype){
  currentFid=fid; currentFtype=ftype;

  // highlight
  iMkrs.forEach(({id,m})=>m.setIcon(iDotIcon(id===fid)));
  cLns.forEach(({id,line})=>line.setStyle(id===fid?{weight:8,opacity:1}:{weight:5,opacity:.85}));
  dPolys.forEach(({id,poly})=>poly.setStyle(id===fid?{fillOpacity:.18,weight:3}:{fillOpacity:.07,weight:2}));

  let feat,cfg;
  if(ftype==='intersection'){feat=INTERSECTIONS.find(x=>x.id===fid);cfg={label:'Intersection',c:'#3b82f6',bg:'#eff6ff',icon:mkIntIcon()};}
  else if(ftype==='corridor'){feat=CORRIDORS.find(x=>x.id===fid);cfg={label:'Corridor',c:'#ec4899',bg:'#fdf2f8',icon:mkCorIcon()};}
  else{feat=DISTRICTS.find(x=>x.id===fid);const d=DISTRICTS.find(x=>x.id===fid);cfg={label:'District',c:d.color,bg:d.color+'18',icon:mkDisIcon(d.color)};}

  const tag=document.getElementById('sbTag');
  tag.textContent=cfg.label;tag.style.background=cfg.bg;tag.style.color=cfg.c;
  const ic=document.getElementById('sbIcon');
  ic.style.background=cfg.bg;ic.innerHTML=cfg.icon;
  document.getElementById('sbTitle').textContent=feat.name;
  document.getElementById('sbSub').textContent=feat.sub;
  document.getElementById('sbSearch').value='';lSearch='';

  document.getElementById('sidebar').classList.add('open');
  renderSidebar();updateKPI();
}

function mkIntIcon(){return `<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><line x1="11" y1="2" x2="11" y2="20" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="11" x2="20" y2="11" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/><circle cx="11" cy="11" r="5" fill="#3b82f6"/><circle cx="11" cy="11" r="2.8" fill="white"/></svg>`;}
function mkCorIcon(){return `<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 18 Q8 14 11 11 Q14 8 18 4" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" fill="none"/><circle cx="4" cy="18" r="3" fill="#ec4899"/><circle cx="18" cy="4" r="3" fill="#ec4899"/><circle cx="11" cy="11" r="2" fill="white" stroke="#ec4899" stroke-width="1.5"/></svg>`;}
function mkDisIcon(c){return `<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="2" width="8" height="8" rx="1.5" stroke="${c}" stroke-width="1.8"/><rect x="12" y="2" width="8" height="8" rx="1.5" stroke="${c}" stroke-width="1.8" fill="${c}" opacity=".2"/><rect x="2" y="12" width="8" height="8" rx="1.5" stroke="${c}" stroke-width="1.8" fill="${c}" opacity=".2"/><rect x="12" y="12" width="8" height="8" rx="1.5" stroke="${c}" stroke-width="1.8"/></svg>`;}

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  currentFid=null;currentFtype=null;
  iMkrs.forEach(({m})=>m.setIcon(iDotIcon(false)));
  cLns.forEach(({line})=>line.setStyle({weight:5,opacity:.85}));
  dPolys.forEach(({poly})=>poly.setStyle({fillOpacity:.07,weight:2}));
  updateKPI();
}

// ══════════════════════════════════════
// RENDER SIDEBAR
// ══════════════════════════════════════
function renderSidebar(q){
  if(!currentFid) return;
  q=q!==undefined?q:lSearch;
  const st=fState[currentFid];
  let html='',visible=0;

  GROUPS.forEach(g=>{
    const items=g.layers.filter(l=>!q||l.name.toLowerCase().includes(q.toLowerCase())||l.desc.toLowerCase().includes(q.toLowerCase()));
    if(q&&items.length===0) return;
    visible+=items.length;
    const open=secOpen[g.id];
    const onCt=items.filter(l=>st[l.id]).length;

    html+=`<div>
      <div class="gsec-hdr" onclick="toggleSec('${g.id}')">
        <svg class="gsec-chev ${open?'open':''}" viewBox="0 0 12 12" fill="none">
          <path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="gsec-dot" style="background:${g.color}"></div>
        <span class="gsec-name" style="color:${g.color}">${g.name}</span>
        <span class="gsec-ct">${onCt}/${items.length}</span>
      </div>
      <div class="gsec-body" style="max-height:${open?'9999px':'0'}">`;

    items.forEach(l=>{
      const on=st[l.id];
      const tags=l.personas.filter(p=>p!=='all').slice(0,2)
        .map(p=>`<span class="ptag ${PC[p]||''}">${PL[p]||p}</span>`).join('');
      html+=`<div class="lr ${on?'on':'off'}" onclick="toggleLayer('${l.id}')">
        <div class="gpin">
          <div class="gpin-shape">${pinSVG(l.color)}</div>
          <div class="gpin-ic">${WIC[l.icon]||WIC.facility}</div>
        </div>
        <div class="lr-info">
          <div class="lr-name">${q?hl(l.name,q):l.name}</div>
          <div class="lr-desc">${l.desc}</div>
        </div>
        ${tags}
        <button class="tog ${on?'on':''}" onclick="event.stopPropagation();toggleLayer('${l.id}')">
          <div class="tog-k"></div>
        </button>
      </div>`;
    });
    html+=`</div></div>`;
  });

  const scroll=document.getElementById('sbScroll');
  scroll.innerHTML=html||(visible===0?`<div class="nores">No layers match</div>`:'');

  // summary bar — by first-letter abbreviation of group
  const sumGroups=['safety','signals','active','transit','roads','land','facilities'];
  const sumLabels={safety:'Safety',signals:'Signals',active:'Active',transit:'Transit',roads:'Roads',land:'Land',facilities:'Facil.'};
  const sumColors={safety:'#dc2626',signals:'#2563eb',active:'#16a34a',transit:'#7c3aed',roads:'#d97706',land:'#0891b2',facilities:'#9333ea'};
  let sHtml='';
  GROUPS.forEach(g=>{
    const ct=g.layers.filter(l=>st[l.id]).length;
    sHtml+=`<div class="sbc"><div class="sbc-n" style="color:${ct>0?g.color:'#d0d5dd'}">${ct}</div><div class="sbc-l">${g.name.split(' ')[0]}</div></div>`;
  });
  document.getElementById('sbSum').innerHTML=sHtml;
  updateKPI();
}

function toggleSec(id){secOpen[id]=!secOpen[id];renderSidebar();}

function toggleLayer(lid){
  if(!currentFid) return;
  const st=fState[currentFid];
  st[lid]=!st[lid];
  const key=currentFid+':'+lid;
  if(st[lid]){
    if(!mapLGs[key]) mapLGs[key]=buildMapLayer(lid,currentFid);
    if(mapLGs[key]) mapLGs[key].addTo(map);
  } else {
    if(mapLGs[key]) map.removeLayer(mapLGs[key]);
  }
  renderSidebar();updateKPI();
}

// ══════════════════════════════════════
// MAP LAYER BUILDER
// ══════════════════════════════════════
function sd(n){let x=Math.sin(n+1)*10000;return x-Math.floor(x);}
function getCenter(fid){
  const ix=INTERSECTIONS.find(x=>x.id===fid);if(ix) return[ix.lat,ix.lng];
  const co=CORRIDORS.find(x=>x.id===fid);if(co){const m=co.coords[Math.floor(co.coords.length/2)];return[m[0],m[1]];}
  const d=DISTRICTS.find(x=>x.id===fid);if(d) return[(d.poly[0][0]+d.poly[2][0])/2,(d.poly[0][1]+d.poly[1][1])/2];
  return[37.978,-122.031];
}

function buildMapLayer(lid,fid){
  const g=L.layerGroup();
  const ld=ALL_LAYERS[lid];
  const color=ld?ld.color:'#3b82f6';
  const icn=ld?ld.icon:'facility';
  const[clat,clng]=getCenter(fid);
  const sp=0.006;

  const mkIc=()=>L.divIcon({
    html:`<div style="position:relative;width:30px;height:36px">
      ${pinSVG(color)}
      <div style="position:absolute;top:5px;left:50%;transform:translateX(-50%);width:18px;height:18px;display:flex;align-items:center;justify-content:center;">
        ${WIC[icn]||WIC.facility}
      </div>
    </div>`,
    iconSize:[30,36],iconAnchor:[15,36],className:''
  });

  if(lid==='col'){
    const cs=['#dc2626','#ea580c','#d97706','#3b82f6'];
    for(let i=0;i<22;i++)
      L.circleMarker([clat+(sd(i*11+1)-.5)*sp*2.5,clng+(sd(i*13+2)-.5)*sp*3],
        {radius:i<5?8:i<10?6:5,fillColor:cs[i<5?0:i<10?1:i<17?2:3],fillOpacity:.9,color:'white',weight:2}).addTo(g);
    return g;
  }
  if(['sidewalk','propbike'].includes(lid)){
    for(let i=0;i<4;i++){
      const la=clat+(sd(i*6+lid.length)-.5)*sp*2,lo=clng+(sd(i*8+lid.length)-.5)*sp*2.5;
      L.polyline([[la,lo],[la+.0013,lo+.0028]],{color,weight:lid==='sidewalk'?4:2.5,dashArray:'5 3',opacity:.85}).addTo(g);
    }
    return g;
  }
  if(lid==='bike'){
    L.polyline([[clat,clng-sp*2],[clat+.001,clng-sp],[clat,clng],[clat-.001,clng+sp],[clat,clng+sp*2]],
      {color,weight:3,opacity:.8}).addTo(g);return g;
  }
  if(lid==='bart'){
    const co=CORRIDORS.find(c=>c.id===fid)||CORRIDORS[0];
    L.polyline(co.coords,{color:'#1e3a8a',weight:4,dashArray:'8 4',opacity:.85}).addTo(g);return g;
  }
  if(['vote','zone','gplan'].includes(lid)){
    L.polygon([[clat+sp,clng-sp*1.4],[clat+sp,clng+sp*1.4],[clat-sp,clng+sp*1.4],[clat-sp,clng-sp*1.4]],
      {color,weight:2,fillColor:color,fillOpacity:.1,dashArray:'5 3'}).addTo(g);return g;
  }
  if(lid==='light'){
    for(let i=0;i<16;i++)
      L.circleMarker([clat+(sd(i*5+3)-.5)*sp*2.5,clng+(sd(i*7+4)-.5)*sp*3],
        {radius:3,fillColor:'#fbbf24',fillOpacity:.85,color:'white',weight:1}).addTo(g);return g;
  }
  const n=['sig','sig2','stop','rrfb','schools','bus'].includes(lid)?5:3;
  for(let i=0;i<n;i++)
    L.marker([clat+(sd(i*7+lid.length+1)-.5)*sp*2,clng+(sd(i*9+lid.length+2)-.5)*sp*2.5],{icon:mkIc()}).addTo(g);
  return g;
}

function filterLayers(q){lSearch=q.trim();renderSidebar(lSearch);}
function updateKPI(){
  let t=0;Object.values(fState).forEach(s=>Object.values(s).forEach(v=>{if(v)t++;}));
  document.getElementById('kpiN').textContent=t;
}
function hl(str,q){
  return str.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<b style="color:#2563eb">$1</b>');
}

let htimer;
function updateHint(m){
  const el=document.getElementById('hint');
  const msgs={intersection:'Click a blue dot to open intersection layers',corridor:'Click a corridor line to manage layers',district:'Click a district to manage layers'};
  el.textContent=msgs[m];el.classList.remove('gone');
  clearTimeout(htimer);htimer=setTimeout(()=>el.classList.add('gone'),4500);
}
setTimeout(()=>document.getElementById('hint').classList.add('gone'),5000);
map.on('click',()=>{if(currentFid) closeSidebar();});

// pulse style
const s=document.createElement('style');
s.textContent='@keyframes pulse{0%,100%{box-shadow:0 0 0 3px #3b82f6,0 4px 20px rgba(59,130,246,.5)}50%{box-shadow:0 0 0 7px rgba(59,130,246,.2),0 4px 20px rgba(59,130,246,.3)}}';
document.head.appendChild(s);
</script>
